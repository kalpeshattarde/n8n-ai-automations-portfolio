services:
  postgres:
    image: postgres:16
    container_name: akcelerate_support_postgres
    environment:
      POSTGRES_DB: akcelerate_support
      POSTGRES_USER: akcelerate_app
      POSTGRES_PASSWORD: akcelerate_support_password
    ports:
      - "5434:5432"
    volumes:
      - support_postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro

volumes:
  support_postgres_data:

