services:
  postgres:
    image: postgres:16
    container_name: akcelerate_revops_postgres
    environment:
      POSTGRES_DB: akcelerate_revops
      POSTGRES_USER: akcelerate_app
      POSTGRES_PASSWORD: akcelerate_revops_password
    ports:
      - "5433:5432"
    volumes:
      - revops_postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro

volumes:
  revops_postgres_data:

