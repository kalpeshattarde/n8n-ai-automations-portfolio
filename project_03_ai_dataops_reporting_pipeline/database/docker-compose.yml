services:
  postgres:
    image: postgres:16
    container_name: akcelerate_dataops_postgres
    environment:
      POSTGRES_DB: akcelerate_dataops
      POSTGRES_USER: akcelerate_app
      POSTGRES_PASSWORD: akcelerate_dataops_password
    ports:
      - "5435:5432"
    volumes:
      - dataops_postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro

volumes:
  dataops_postgres_data:

